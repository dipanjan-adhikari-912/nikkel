<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkel DB Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; background: #0f172a; color: #e2e8f0; padding: 24px; max-width: 860px; margin: auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    .creds { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; }
    .creds code { color: #94a3b8; }
    .creds .val { color: #e2e8f0; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    button { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; border-radius: 4px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
    button:hover { background: #334155; border-color: #6366f1; }
    button.primary { background: #6366f1; border-color: #6366f1; font-weight: 500; }
    button.primary:hover { background: #4f46e5; }
    button.success { background: #059669; border-color: #059669; }
    button.danger { background: #dc2626; border-color: #dc2626; }
    button:disabled { opacity: .4; cursor: default; }
    .section { margin-bottom: 20px; }
    .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    #log { background: #0c1222; border: 1px solid #1e293b; border-radius: 6px; padding: 12px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 12px; line-height: 1.6; max-height: 500px; overflow-y: auto; }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #1e293b; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #64748b; margin-right: 8px; }
    .log-ok { color: #34d399; font-weight: 500; }
    .log-err { color: #f87171; font-weight: 500; }
    .log-info { color: #60a5fa; }
    .log-detail { color: #94a3b8; white-space: pre-wrap; word-break: break-all; margin-top: 2px; padding-left: 16px; font-size: 11px; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #475569; border-top-color: #6366f1; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #64748b; }
    .status-bar .pass { color: #34d399; }
    .status-bar .fail { color: #f87171; }
  </style>
</head>
<body>
  <h1>⚡ Nikkel DB Debug</h1>
  <p class="sub">Test each Supabase endpoint and inspect raw responses.</p>

  <div class="creds">
    <div><code>SUPABASE_URL</code> <span class="val" id="dbUrl"></span></div>
    <div><code>SUPABASE_ANON</code> <span class="val" id="dbKey"></span></div>
    <div><code>EXTENSION_ID</code> <span class="val" id="extId"></span></div>
    <div><code>REDIRECT_URI</code> <span class="val" id="redirectUri"></span></div>
  </div>

  <div class="status-bar">
    <span>Tests: <span id="testCount">0</span></span>
    <span class="pass">Passed: <span id="testPassed">0</span></span>
    <span class="fail">Failed: <span id="testFailed">0</span></span>
  </div>

  <div class="section">
    <h2>Auth</h2>
    <div class="btn-group">
      <button class="primary" data-test="anonSignIn">Anon Sign In</button>
      <button data-test="checkGoogleOAuth">Check Google OAuth Config</button>
    </div>
  </div>

  <div class="section">
    <h2>Projects</h2>
    <div class="btn-group">
      <button data-test="getProjects">Get Projects</button>
      <button data-test="createProject">Create Project</button>
    </div>
  </div>

  <div class="section">
    <h2>Nikkels</h2>
    <div class="btn-group">
      <button data-test="submitNikkel">Submit Nikkel</button>
      <button data-test="getNikkels">Get Nikkels</button>
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="runAll">▶ Run All Tests</button>
    <button id="clearBtn">✕ Clear Log</button>
  </div>

  <div id="log"></div>

  <script src="debug.js"></script>
</body>
</html>
