<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; background: #0f172a; color: #e2e8f0; padding: 0; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid #1e293b; background: #0c1222; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .back { color: #64748b; cursor: pointer; font-size: 14px; text-decoration: none; }
    .back:hover { color: #e2e8f0; }
    .content { max-width: 520px; margin: 0 auto; padding: 24px; }
    .section { margin-bottom: 28px; }
    .section h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; }
    .row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
    .row + .row { border-top: 1px solid #334155; }
    .row label { flex: 0 0 100px; font-size: 13px; color: #94a3b8; }
    .row .value { flex: 1; font-size: 13px; color: #e2e8f0; }
    input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; padding: 8px 10px; font-size: 13px; }
    input:focus { outline: none; border-color: #6366f1; }
    .btn { display: inline-flex; align-items: center; justify-content: center; background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    .btn-outline:hover { background: #1e293b; color: #e2e8f0; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .msg { display: none; font-size: 12px; padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; }
    .msg-error { display: block; background: #7f1d1d; color: #fecaca; }
    .msg-success { display: block; background: #064e3b; color: #6ee7b7; }
    .actions { margin-top: 16px; display: flex; gap: 8px; }
    .inline-action { display: flex; align-items: center; gap: 8px; }
    .inline-action input { flex: 1; }
    .inline-action .btn { flex-shrink: 0; }
    .provider-tag { display: inline-flex; align-items: center; gap: 6px; background: #0f172a; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
    .provider-tag.google { color: #94a3b8; }
    .provider-tag.email { color: #94a3b8; }
    .sep { border: none; border-top: 1px solid #1e293b; margin: 12px 0; }
    .verified { color: #34d399; font-size: 11px; }
    .unverified { color: #fbbf24; font-size: 11px; }
    .loading { text-align: center; padding: 60px 20px; color: #64748b; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #475569; border-top-color: #6366f1; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" id="backBtn">&larr; Back</a>
    <h1>Settings</h1>
  </div>

  <div class="content" id="mainContent" style="display:none">
    <div id="globalMsg" class="msg"></div>

    <div class="section">
      <h2>Profile</h2>
      <div class="card">
        <div class="row">
          <label>Display Name</label>
          <div class="inline-action" style="flex:1">
            <input type="text" id="displayNameInput" autocomplete="name" />
            <button class="btn btn-sm" id="saveNameBtn">Save</button>
          </div>
        </div>
        <div class="row">
          <label>Email</label>
          <div class="value" id="emailValue"></div>
        </div>
        <div class="row" id="verifiedRow" style="display:none">
          <label></label>
          <div class="value" id="verifiedValue"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Security</h2>
      <div class="card">
        <div class="row">
          <label>New Password</label>
          <div class="inline-action" style="flex:1">
            <input type="password" id="newPasswordInput" placeholder="Enter new password" autocomplete="new-password" />
            <button class="btn btn-sm" id="changePwdBtn">Change</button>
          </div>
        </div>
        <div class="row" style="border:none">
          <label></label>
          <div>
            <span class="link" id="forgotPwdLink" style="color:#6366f1;cursor:pointer;font-size:12px">Send password reset email</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Connected Accounts</h2>
      <div class="card" id="providersCard">
        <div id="providersList"></div>
      </div>
    </div>

    <div class="section" style="margin-top:32px">
      <button class="btn btn-danger" id="signOutSettingsBtn" style="width:100%">Sign Out</button>
    </div>
  </div>

  <div class="loading" id="loadingView">
    <div class="spinner"></div>
    <p style="margin-top:12px">Loading settings…</p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
