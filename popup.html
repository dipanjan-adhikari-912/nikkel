<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #0f172a; color: #e2e8f0; }
    .view { display: none; padding: 20px; }
    .view.active { display: block; }
    .icon { font-size: 32px; text-align: center; margin-bottom: 8px; }
    h2 { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .sub { color: #64748b; text-align: center; font-size: 13px; margin-bottom: 16px; line-height: 1.4; }
    .btn { display: block; background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; text-align: center; }
    .btn:hover { background: #4f46e5; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    .btn-outline:hover { background: #1e293b; color: #e2e8f0; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-google { background: #fff; color: #1e293b; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-google:hover { background: #f1f5f9; }
    .link { color: #6366f1; cursor: pointer; font-size: 12px; }
    .link:hover { text-decoration: underline; }
    .sep { height: 1px; background: #1e293b; margin: 12px 0; }
    #globalError { display: none; background: #7f1d1d; color: #fecaca; padding: 6px 12px; font-size: 12px; border-bottom: 1px solid #991b1b; }
    .project-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; text-align: center; }
    .project-url { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 12px; word-break: break-all; }
    .share-box { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
    .share-box input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; padding: 6px 8px; font-size: 12px; margin-bottom: 8px; box-sizing: border-box; }
    .share-msg { text-align: center; color: #94a3b8; font-size: 12px; line-height: 1.4; padding: 8px 0; }
    .action-row { display: flex; gap: 6px; }
    .action-row .btn { flex: 1; }
  </style>
</head>
<body>
  <div id="globalError"></div>

  <div id="vWelcome" class="view active">
    <div class="icon">📌</div>
    <h2>Welcome to Nikkel</h2>
    <p class="sub">Review this website directly.<br />Drop pins, leave comments, share feedback.</p>
    <button class="btn" id="startReviewBtn">▶ Start Review</button>
    <div class="sep"></div>
    <span class="link" id="resetLink" style="display:none">Reset session</span>
  </div>

  <div id="vActive" class="view">
    <div class="project-name" id="activeProjectName"></div>
    <div class="project-url" id="activeProjectUrl"></div>
    <div class="action-row">
      <button class="btn btn-sm btn-outline" id="stopReviewBtn">✓ Done</button>
      <button class="btn btn-sm" id="shareBtn">🔗 Share</button>
    </div>
    <div class="sep"></div>
    <div id="shareSection"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
